name: Postman Collection Run
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  postman:
    runs-on: ubuntu-latest
    name: Run Recommendations Tests
    steps:
      - uses: actions/checkout@v4

      - name: Install and Run Postman Tests
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          curl -o- "https://dl-cli.pstmn.io/install.sh" | sh
          export PATH="$HOME/.local/share/postman-cli:$PATH"
          postman login --with-api-key "$POSTMAN_API_KEY"
          postman collection run "52238111-eb920a70-b184-4cfb-bdb6-1388d7c4d1a1" \
            --environment "52238111-db96d8f3-ef43-4b67-a258-686f0634f60c" \
            --verbose