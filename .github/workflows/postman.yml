name: Postman Collection Run
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  postman:
    runs-on: ubuntu-latest
    name: Run Recommendations Tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: npm install -g @postman/cli

      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Run Postman Collection
        run: |
          postman collection run "52238111-eb920a70-b184-4cfb-bdb6-1388d7c4d1a1" \
            --environment "52238111-db96d8f3-ef43-4b67-a258-686f0634f60c" \
            --verbose
